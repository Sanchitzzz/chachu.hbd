<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Happy Birthday ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: url("bg.webp") center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
        }

        .startScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            font-size: 30px;
            cursor: pointer;
        }

        .textBox {
            position: relative;
            z-index: 2;
            width: 80%;
            max-width: 700px;
            font-size: 42px;
            line-height: 1.4;
            font-weight: bold;
            text-shadow: 0 0 15px black;
            opacity: 0;
        }

        .cursor {
            border-right: 3px solid white;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {
                border-color: white
            }

            50% {
                border-color: transparent
            }

            100% {
                border-color: white
            }
        }

        /* CONFETTI ITEMS */
        .confetti {
            position: fixed;
            top: -20px;
            font-size: 28px;
            animation: fall linear forwards;
            z-index: 10;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="startScreen" id="startScreen">
        Tap to open your surprise ❤️
    </div>

    <div class="overlay"></div>

    <div class="textBox" id="textBox">
        <span id="typing"></span><span class="cursor"></span>
    </div>

    <audio id="music" preload="auto" loop>
        <source src="bg.mp3" type="audio/mp3">
    </audio>

    <script>
        // Create shareable links by cloning the current URL into a textarea.
        // (No external hosting required; share the local path for testing.)
        function ensureShareLinkUI() {
            if (document.getElementById('shareLinkWrap')) return;
            const wrap = document.createElement('div');
            wrap.id = 'shareLinkWrap';
            wrap.style.position = 'fixed';
            wrap.style.bottom = '16px';
            wrap.style.left = '50%';
            wrap.style.transform = 'translateX(-50%)';
            wrap.style.zIndex = '20';
            wrap.style.background = 'rgba(0,0,0,0.6)';
            wrap.style.padding = '10px 12px';
            wrap.style.borderRadius = '10px';
            wrap.style.width = 'min(92vw, 680px)';

            wrap.innerHTML = `
                <div style="display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
                    <div style="flex:1; min-width: 240px;">
                        <div style="color:white; font-weight:bold; font-size:14px; margin-bottom:6px;">Share link</div>
                        <textarea id="shareLink" style="width:100%; height:44px; resize:none; border-radius:8px; padding:8px;" readonly></textarea>
                    </div>
                    <button id="copyShareLink" style="padding:10px 14px; border-radius:10px; cursor:pointer; border:none; font-weight:bold;">
                        Copy
                    </button>
                </div>
            `;

            document.body.appendChild(wrap);

            const linkInput = document.getElementById('shareLink');
            // Use current URL (works when hosted). For file://, it still lets you copy the path.
            linkInput.value = window.location.href;

            const copyBtn = document.getElementById('copyShareLink');
            copyBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(linkInput.value);
                    copyBtn.textContent = 'Copied!';
                    setTimeout(() => (copyBtn.textContent = 'Copy'), 1200);
                } catch (e) {
                    linkInput.select();
                    document.execCommand('copy');
                }
            });
        }
    </script>

    <script>
        const startScreen = document.getElementById("startScreen");
        const music = document.getElementById("music");
        const textBox = document.getElementById("textBox");

        startScreen.addEventListener("click", startExperience);

        function startExperience() {
            startScreen.style.display = "none";
            textBox.style.opacity = 1;
            music.play().catch(() => setTimeout(() => music.play(), 300));
            typeEffect();
        }

        // CONFETTI FUNCTION
        function launchConfetti() {
            const emojis = ["💌", "🎀"];
            for (let i = 0; i < 80; i++) {
                const conf = document.createElement("div");
                conf.className = "confetti";
                conf.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                conf.style.left = Math.random() * 100 + "vw";
                conf.style.animationDuration = (Math.random() * 3 + 2) + "s";
                document.body.appendChild(conf);

                setTimeout(() => conf.remove(), 5000);
            }
        }

        // TEXT ANIMATION
        const lines = [
            "Happy Birthday Babe ❤️",
            "hope today feels like sunshine, warm hugs, and your favorite song playing in the background..",
            "Because that’s kinda how you feel to me.",
            "Anyways...",
            "I love you."
        ];

        let lineIndex = 0, charIndex = 0, currentText = "", isDeleting = false;

        function typeEffect() {
            const typing = document.getElementById("typing");
            let fullText = lines[lineIndex];

            if (!isDeleting) { currentText = fullText.substring(0, charIndex++); }
            else { currentText = fullText.substring(0, charIndex--); }

            typing.textContent = currentText;
            let speed = isDeleting ? 40 : 80;

            if (!isDeleting && charIndex === fullText.length + 1) {
                if (lineIndex === lines.length - 1) launchConfetti(); // 🎉 trigger on I love you
                speed = 1600;
                isDeleting = true;
            }
            else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                lineIndex++;
                speed = 500;
                if (lineIndex === lines.length) lineIndex = lines.length - 1;
            }

            setTimeout(typeEffect, speed);
        }
    </script>

</body>

</html>
